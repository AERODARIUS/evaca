# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
permissions:
  contents: read
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Security audit
        run: npm run security:audit:ci
      - name: Functions lint
        run: npm run functions:lint
      - name: Functions test coverage
        run: npm run functions:test:coverage
      - name: Functions rules tests
        run: npm run functions:test:rules
      - name: Web accessibility tests
        run: npm run web:test:a11y
      - name: Web tests
        run: npm run test
      - name: Build app
        run: npm run build
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ERP_RPG }}
          channelId: live
          projectId: erp-rpg
          entryPoint: app
